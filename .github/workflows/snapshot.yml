name: WM-Snapshot + Dashboard Deploy

on:
  schedule:
    # 09:30 und 16:00 Europe/Berlin (CEST = UTC+2, im Juni/Juli)
    - cron: '30 7 * * *'
    - cron: '0 14 * * *'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'src/**'
      - '.github/workflows/snapshot.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Snapshot + Dashboard bauen
        working-directory: src
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID || '1' }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON || '2026' }}
          AVAILABILITY_JSON_URL: ${{ secrets.AVAILABILITY_JSON_URL }}
        run: |
          python3 update_availability.py || true
          python3 update_cards_public.py --apply-safe || true
          python3 update_cards.py || true
          python3 snapshot.py
          python3 incentives.py
          python3 context_factors.py
          python3 explain_snapshot.py
          python3 dashboard.py

      - name: Geänderte Snapshots zurück nach main committen
        run: |
          git config user.name  "wm-bot"
          git config user.email "wm-bot@users.noreply.github.com"
          git add output/snapshots/ output/ data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "snapshot: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "Nichts Neues zu committen."
          fi

      - name: Pages-Artefakt vorbereiten
        run: |
          mkdir -p _site
          cp -r output/* _site/
          # Default-Seite -> dashboard.html
          if [ -f _site/dashboard.html ] && [ ! -f _site/index.html ]; then
            cp _site/dashboard.html _site/index.html
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: snapshot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
